name: publish
on:
  release:
    types: [published]
permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC)
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Zero dependencies — nothing to install; test then publish.
      - run: node --test
      - run: npm publish
