version: 2
updates:
  # Keeps the SignalK reusable plugin-ci.yml pin (and every other action we
  # use) current — opens a single grouped PR when signalk-server cuts a release
  # so the pin can't silently drift behind the latest tag.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      # signalk-server carries a stray ancient v6.6.6 tag (a 2019 commit with no
      # plugin-ci.yml) that outranks the real 2.x release line by semver, so
      # dependabot "upgrades" the reusable-workflow pin to a dead ref and the
      # workflow fails to load (0s failure). Ignore majors: the real releases are
      # 2.x minors, which dependabot still tracks; a genuine 3.0 we'll bump by hand.
      - dependency-name: "SignalK/signalk-server*"
        update-types: ["version-update:semver-major"]
